version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: qantara_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qantara_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/qantara_db?schema=public
      - PORT=5000
      - JWT_SECRET=qantara-secret-key-12345
      - NODE_ENV=development
      # Use host.docker.internal to access Ollama running on the Windows host machine
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - server

volumes:
  pgdata:
